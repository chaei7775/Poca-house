<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>POCA HOUSE BURGER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --pink: #FF6B9D;
    --pink-light: #FFB3CC;
    --pink-pale: #FFF0F5;
    --purple: #C084FC;
    --gold: #F59E0B;
    --dark: #1a1a2e;
    --white: #fff;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--pink-pale);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── TOP BAR ── */
  .topbar {
    background: linear-gradient(135deg, #FF6B9D, #C084FC);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px #FF6B9D44;
  }
  .topbar-logo {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .topbar-logo span { color: #FFE4EF; }
  .coins {
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── HOME SCREEN ── */
  #screen-home {
    background: linear-gradient(180deg, #FFF0F5 0%, #FFE4EF 100%);
  }
  .home-banner {
    position: relative;
    width: 100%;
    height: 260px;
    overflow: hidden;
    background: #FFD6E8;
  }
  .home-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  .home-banner-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 16px 12px;
    background: linear-gradient(to top, #FFF0F5ee, transparent);
  }
  .home-banner-title {
    font-size: 22px;
    font-weight: 900;
    color: var(--pink);
    text-shadow: 0 1px 8px #fff8;
  }
  .home-banner-sub {
    font-size: 12px;
    color: #FF6B9D99;
    margin-top: 2px;
  }

  .home-actions {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn-main {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-main:active { transform: scale(0.97); }

  .btn-alba {
    background: linear-gradient(135deg, #FF6B9D, #FF8FAB);
    color: #fff;
    box-shadow: 0 4px 20px #FF6B9D55;
  }
  .btn-gacha {
    background: linear-gradient(135deg, #C084FC, #A855F7);
    color: #fff;
    box-shadow: 0 4px 20px #C084FC55;
  }
  .btn-collection {
    background: #fff;
    color: var(--pink);
    border: 2px solid var(--pink-light);
    box-shadow: 0 2px 12px #FF6B9D22;
  }

  /* 보유 아이돌 미리보기 */
  .idol-preview {
    padding: 0 16px 16px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #FF6B9D99;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .idol-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .idol-chip {
    background: #fff;
    border: 1.5px solid var(--pink-light);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--pink);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .idol-chip .grade {
    font-size: 10px;
    background: linear-gradient(135deg, #C084FC, #A855F7);
    color: #fff;
    border-radius: 6px;
    padding: 1px 5px;
  }
  .empty-idol {
    font-size: 13px;
    color: #FFB3CC;
    padding: 8px 0;
  }

  /* ── ALBA SCREEN ── */
  #screen-alba {
    background: #1a1a2e;
    position: relative;
    overflow: hidden;
  }
  .alba-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('https://raw.githubusercontent.com/chaei7775/Poca-house/main/Alba.png');
    background-size: cover;
    background-position: center;
    opacity: 0.35;
  }
  .alba-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    gap: 16px;
    min-height: 100vh;
  }

  .alba-title {
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    text-align: center;
  }
  .alba-subtitle {
    font-size: 12px;
    color: #FFB3CC;
    text-align: center;
    margin-top: -12px;
  }

  /* 게이지바 게임 */
  .gauge-container {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .gauge-label {
    font-size: 13px;
    color: #FFB3CC;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .gauge-track {
    width: 100%;
    height: 36px;
    background: rgba(255,255,255,0.15);
    border-radius: 18px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.2);
  }

  /* 퍼펙트 존 */
  .gauge-perfect {
    position: absolute;
    top: 0; bottom: 0;
    background: linear-gradient(90deg, #FFD700aa, #FFD700, #FFD700aa);
    border-radius: 4px;
    width: 18%;
    left: 41%;
    transition: none;
  }
  .gauge-great {
    position: absolute;
    top: 0; bottom: 0;
    background: linear-gradient(90deg, #FF6B9Daa, #FF6B9D, #FF6B9Daa);
    border-radius: 4px;
    width: 30%;
    left: 35%;
  }

  /* 움직이는 마커 */
  .gauge-marker {
    position: absolute;
    top: 4px; bottom: 4px;
    width: 6px;
    background: #fff;
    border-radius: 3px;
    box-shadow: 0 0 12px #fff, 0 0 4px #FFD700;
    left: 0;
    transition: none;
  }

  .gauge-zones {
    display: flex;
    gap: 12px;
    font-size: 11px;
    font-weight: 700;
  }
  .zone { display: flex; align-items: center; gap: 4px; }
  .zone-dot { width: 10px; height: 10px; border-radius: 50%; }

  .tap-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #FF6B9D, #C084FC);
    border: none;
    border-radius: 16px;
    color: #fff;
    font-size: 20px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 20px #FF6B9D55;
    letter-spacing: 1px;
    transition: transform 0.08s;
  }
  .tap-btn:active { transform: scale(0.96); }

  /* 결과 팝업 */
  .result-popup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(26,26,46,0.95);
    border: 2px solid;
    border-radius: 20px;
    padding: 24px 32px;
    text-align: center;
    z-index: 200;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    min-width: 200px;
  }
  .result-popup.show { transform: translate(-50%, -50%) scale(1); }
  .result-grade {
    font-size: 36px;
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    letter-spacing: 2px;
  }
  .result-coins {
    font-size: 16px;
    color: var(--gold);
    font-weight: 700;
    margin-top: 4px;
  }
  .result-sub {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }

  /* 알바 횟수 */
  .alba-count {
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 20px;
    text-align: center;
    width: 100%;
  }
  .alba-count-num {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
  }
  .alba-count-label {
    font-size: 11px;
    color: #FFB3CC;
    margin-top: 2px;
  }

  /* 자동 알바 아이돌 */
  .auto-idols {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px;
  }
  .auto-idol-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 13px;
    color: #eee;
  }
  .auto-idol-row:last-child { border-bottom: none; }
  .auto-idol-name { font-weight: 700; color: #C084FC; }
  .auto-coin { color: var(--gold); font-weight: 700; font-size: 12px; }

  .back-btn {
    width: 100%;
    padding: 14px;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }

  /* ── GACHA SCREEN ── */
  #screen-gacha {
    background: linear-gradient(180deg, #1a1a2e 0%, #2d1b4e 100%);
    padding: 0 0 32px;
  }
  .gacha-header {
    padding: 20px 16px 0;
    text-align: center;
  }
  .gacha-title {
    font-size: 24px;
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #C084FC, #FF6B9D);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .gacha-sub {
    font-size: 12px;
    color: #C084FC88;
    margin-top: 4px;
  }
  .gacha-coins-display {
    background: rgba(192,132,252,0.15);
    border: 1.5px solid #C084FC44;
    border-radius: 12px;
    padding: 10px 16px;
    margin: 16px;
    text-align: center;
    font-size: 15px;
    color: var(--gold);
    font-weight: 700;
  }

  /* 카드 뽑기 결과 */
  .gacha-card-area {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .gacha-card {
    width: 100%;
    max-width: 280px;
    aspect-ratio: 3/4;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 8px 40px #C084FC44;
    background: #2d1b4e;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gacha-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .gacha-card-back {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #2d1b4e, #1a1a2e);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .gacha-card-back-logo {
    font-size: 32px;
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    color: #C084FC44;
    letter-spacing: 4px;
  }
  .gacha-card-back-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .gacha-btn-row {
    display: flex;
    gap: 10px;
    padding: 0 16px;
    width: 100%;
  }
  .gacha-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .gacha-btn:active { transform: scale(0.97); }
  .gacha-btn-1 {
    background: rgba(192,132,252,0.2);
    border: 1.5px solid #C084FC;
    color: #C084FC;
  }
  .gacha-btn-3 {
    background: linear-gradient(135deg, #C084FC, #A855F7);
    color: #fff;
    box-shadow: 0 4px 16px #C084FC44;
  }
  .gacha-cost {
    font-size: 11px;
    opacity: 0.8;
    font-weight: 400;
  }

  /* 뽑기 결과 오버레이 */
  .gacha-result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.9);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
  }
  .gacha-result-overlay.show { display: flex; }
  .gacha-result-card {
    width: 240px;
    aspect-ratio: 3/4;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 60px #C084FC88;
    animation: cardReveal 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .gacha-result-card img { width: 100%; height: 100%; object-fit: cover; }
  @keyframes cardReveal {
    from { transform: rotateY(90deg) scale(0.8); opacity: 0; }
    to { transform: rotateY(0deg) scale(1); opacity: 1; }
  }
  .gacha-result-grade {
    font-size: 28px;
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    text-align: center;
  }
  .gacha-result-name {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    text-align: center;
  }
  .gacha-close-btn {
    padding: 14px 40px;
    background: linear-gradient(135deg, #FF6B9D, #C084FC);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }

  /* ── COLLECTION SCREEN ── */
  #screen-collection {
    background: var(--pink-pale);
    padding-bottom: 24px;
  }
  .collection-header {
    padding: 20px 16px 12px;
    background: linear-gradient(135deg, #FF6B9D, #C084FC);
  }
  .collection-title {
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    font-family: 'Nunito', sans-serif;
  }
  .collection-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }
  .collection-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px;
  }
  .card-item {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px #FF6B9D22;
    position: relative;
  }
  .card-item img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
  }
  .card-item-info {
    padding: 8px 10px;
  }
  .card-item-name {
    font-size: 13px;
    font-weight: 700;
    color: #333;
  }
  .card-item-grade {
    font-size: 11px;
    font-weight: 700;
    margin-top: 2px;
  }
  .card-locked {
    filter: grayscale(1) brightness(0.4);
  }
  .card-locked-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    background: rgba(0,0,0,0.3);
  }
  .card-item.owned .card-item-grade { color: var(--pink); }

  /* ── NAV BAR ── */
  .navbar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: #fff;
    border-top: 1.5px solid #FFE4EF;
    display: flex;
    z-index: 100;
    box-shadow: 0 -4px 20px #FF6B9D22;
  }
  .nav-item {
    flex: 1;
    padding: 10px 0 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'Noto Sans KR', sans-serif;
    transition: color 0.15s;
    color: #FFB3CC;
  }
  .nav-item.active { color: var(--pink); }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 10px; font-weight: 700; }

  /* 하단 네비 높이 보정 */
  .screen { padding-bottom: 70px; }

  /* 애니메이션 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeInUp 0.3s ease both; }

  /* 결과 팝업 배경 */
  .result-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 150;
  }
  .result-bg.show { display: block; }

  /* 코인 획득 플로팅 */
  .coin-float {
    position: fixed;
    font-size: 18px;
    font-weight: 900;
    color: var(--gold);
    pointer-events: none;
    z-index: 500;
    animation: floatUp 1s ease forwards;
    text-shadow: 0 2px 8px #0004;
  }
  @keyframes floatUp {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-60px); }
  }
</style>
</head>
<body>

<!-- ── HOME ── -->
<div id="screen-home" class="screen active">
  <div class="topbar">
    <div class="topbar-logo">POCA<span>HOUSE</span></div>
    <div class="coins">🍔 <span id="coin-display">0</span></div>
  </div>

  <div class="home-banner">
    <img id="home-banner-img" src="https://raw.githubusercontent.com/chaei7775/Poca-house/main/Mimi alba.jpg" alt="포카하우스버거"
      onerror="this.style.display='none'">
    <div style="position:absolute;inset:0;background:linear-gradient(135deg,#FFD6E8,#FFB3CC,#C084FC33);display:flex;align-items:center;justify-content:center;" id="home-banner-placeholder">
      <div style="text-align:center;">
        <div style="font-size:64px;">🍔</div>
        <div style="font-size:20px;font-weight:900;color:#FF6B9D;margin-top:8px;">POCA HOUSE BURGER</div>
      </div>
    </div>
    <div class="home-banner-overlay">
      <div class="home-banner-title">오늘도 알바 가자! 🎀</div>
      <div class="home-banner-sub">열심히 일하고 아이돌 카드 뽑아봐</div>
    </div>
  </div>

  <div class="home-actions animate-in">
    <button class="btn-main btn-alba" onclick="goTo('alba')">
      🍔 알바하기
    </button>
    <button class="btn-main btn-gacha" onclick="goTo('gacha')">
      ✨ 카드 뽑기
    </button>
    <button class="btn-main btn-collection" onclick="goTo('collection')">
      📁 내 컬렉션
    </button>
  </div>

  <div class="idol-preview">
    <div class="section-title">내 아이돌</div>
    <div class="idol-chips" id="home-idol-chips">
      <div class="empty-idol">아직 카드가 없어요 💔<br>뽑기 해봐!</div>
    </div>
  </div>
</div>

<!-- ── ALBA ── -->
<div id="screen-alba" class="screen">
  <div class="alba-bg" id="alba-bg"></div>
  <div class="alba-content">
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
      <div class="alba-title">🍔 포카하우스 알바</div>
      <div class="coins" style="background:rgba(255,255,255,0.2);">🍔 <span id="coin-alba">0</span></div>
    </div>
    <div class="alba-subtitle">게이지가 퍼펙트 존에 올 때 탭!</div>

    <div class="alba-count">
      <div class="alba-count-num" id="alba-done">0</div>
      <div class="alba-count-label">오늘 알바 횟수</div>
    </div>

    <div class="gauge-container">
      <div class="gauge-label">🥩 패티 타이밍</div>
      <div class="gauge-track" id="gauge-track" onclick="tapGauge()">
        <div class="gauge-great"></div>
        <div class="gauge-perfect"></div>
        <div class="gauge-marker" id="gauge-marker"></div>
      </div>
      <div class="gauge-zones">
        <div class="zone"><div class="zone-dot" style="background:#FFD700"></div><span style="color:#FFD700">PERFECT</span></div>
        <div class="zone"><div class="zone-dot" style="background:#FF6B9D"></div><span style="color:#FF6B9D">GREAT</span></div>
        <div class="zone"><div class="zone-dot" style="background:#666"></div><span style="color:#aaa">MISS</span></div>
      </div>
      <button class="tap-btn" onclick="tapGauge()">TAP! 👊</button>
    </div>

    <div id="auto-idols-section" style="display:none;width:100%;">
      <div class="section-title" style="color:#FFB3CC;">자동 알바 중 ✨</div>
      <div class="auto-idols" id="auto-idol-list"></div>
    </div>

    <button class="back-btn" onclick="goTo('home')">← 홈으로</button>
  </div>
</div>

<!-- ── GACHA ── -->
<div id="screen-gacha" class="screen">
  <div class="topbar">
    <div class="topbar-logo">POCA<span>HOUSE</span></div>
    <div class="coins">🍔 <span id="coin-gacha">0</span></div>
  </div>
  <div class="gacha-header">
    <div class="gacha-title">CARD DRAW</div>
    <div class="gacha-sub">어떤 아이돌이 나올까? 💜</div>
  </div>
  <div class="gacha-coins-display">보유 코인: 🍔 <span id="coin-gacha2">0</span></div>

  <div class="gacha-card-area">
    <div class="gacha-card">
      <div class="gacha-card-back">
        <div class="gacha-card-back-logo">POCA<br>HOUSE</div>
        <div class="gacha-card-back-icon">🎴</div>
      </div>
    </div>
  </div>

  <div style="height:16px;"></div>

  <div class="gacha-btn-row">
    <button class="gacha-btn gacha-btn-1" onclick="doDraw(1)">
      1뽑<br><span class="gacha-cost">🍔 100</span>
    </button>
    <button class="gacha-btn gacha-btn-3" onclick="doDraw(3)">
      3뽑<br><span class="gacha-cost">🍔 280</span>
    </button>
  </div>

  <div style="padding:12px 16px 0;">
    <button class="back-btn" style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);color:#aaa;" onclick="goTo('home')">← 홈으로</button>
  </div>
</div>

<!-- ── COLLECTION ── -->
<div id="screen-collection" class="screen">
  <div class="collection-header">
    <div class="collection-title">내 컬렉션 📁</div>
    <div class="collection-sub" id="collection-count">0 / 0 보유</div>
  </div>
  <div class="collection-grid" id="collection-grid"></div>
  <div style="padding:0 16px;">
    <button class="back-btn" onclick="goTo('home')">← 홈으로</button>
  </div>
</div>

<!-- 네비바 -->
<nav class="navbar">
  <button class="nav-item active" onclick="goTo('home')" id="nav-home">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">홈</span>
  </button>
  <button class="nav-item" onclick="goTo('alba')" id="nav-alba">
    <span class="nav-icon">🍔</span>
    <span class="nav-label">알바</span>
  </button>
  <button class="nav-item" onclick="goTo('gacha')" id="nav-gacha">
    <span class="nav-icon">✨</span>
    <span class="nav-label">뽑기</span>
  </button>
  <button class="nav-item" onclick="goTo('collection')" id="nav-collection">
    <span class="nav-icon">📁</span>
    <span class="nav-label">컬렉션</span>
  </button>
</nav>

<!-- 결과 팝업 -->
<div class="result-bg" id="result-bg"></div>
<div class="result-popup" id="result-popup">
  <div class="result-grade" id="result-grade-text"></div>
  <div class="result-coins" id="result-coins-text"></div>
  <div class="result-sub" id="result-sub-text"></div>
</div>

<!-- 가챠 결과 오버레이 -->
<div class="gacha-result-overlay" id="gacha-overlay">
  <div class="gacha-result-grade" id="gacha-res-grade"></div>
  <div class="gacha-result-card" id="gacha-res-card">
    <img id="gacha-res-img" src="" alt="">
  </div>
  <div class="gacha-result-name" id="gacha-res-name"></div>
  <button class="gacha-close-btn" onclick="closeGachaResult()">획득! 💜</button>
</div>

<script>
// ── 상태 ──
let coins = parseInt(localStorage.getItem('ph_coins') || '0');
let owned = JSON.parse(localStorage.getItem('ph_owned') || '[]');
let albaDone = parseInt(localStorage.getItem('ph_alba') || '0');

const B = "https://raw.githubusercontent.com/chaei7775/Poca-house/main/";

// ── 카드 데이터 ──
const CARDS = [
  // UR
  { id: 'ian',    name: '이안 (IAN)',    grade: 'UR',  gradeColor: '#C084FC', img: B+'Ian.png',           autoCoins: 15 },
  { id: 'seonwoo',name: '선우',          grade: 'UR',  gradeColor: '#C084FC', img: B+'Sunu.png',          autoCoins: 15 },
  { id: 'ryo',    name: '료 (RYO)',      grade: 'UR',  gradeColor: '#C084FC', img: B+'Ryo.png',           autoCoins: 15 },
  // SSR
  { id: 'wolf',   name: '울프컷',        grade: 'SSR', gradeColor: '#F59E0B', img: B+'Woolf.png',         autoCoins: 8 },
  { id: 'band',   name: '장발밴드맨',    grade: 'SSR', gradeColor: '#F59E0B', img: B+'Long band.png',     autoCoins: 8 },
  { id: 'twin',   name: '양갈래아이돌',  grade: 'SSR', gradeColor: '#F59E0B', img: B+'Silver.png',        autoCoins: 8 },
  { id: 'sports', name: '스포츠스타',    grade: 'SSR', gradeColor: '#F59E0B', img: B+'Sports.png',        autoCoins: 8 },
  { id: 'curtain',name: '커튼미들',      grade: 'SSR', gradeColor: '#F59E0B', img: B+'Middle%20.png',       autoCoins: 8 },
  { id: 'blue',   name: '파란머리',      grade: 'SSR', gradeColor: '#F59E0B', img: B+'Blue.png',            autoCoins: 8 },
  { id: 'vampire',name: '적발뱀파이어',  grade: 'SSR', gradeColor: '#F59E0B', img: B+'Red.png',             autoCoins: 8 },
  { id: 'tuxedo', name: '블랙턱시도',    grade: 'SSR', gradeColor: '#F59E0B', img: B+'Tuxedo%20.png',       autoCoins: 8 },
  { id: 'cozy',   name: '포근한오후',    grade: 'SSR', gradeColor: '#F59E0B', img: B+'Sweetheart%20.png',   autoCoins: 8 },
  { id: 'semi',   name: '세미정장',      grade: 'SSR', gradeColor: '#F59E0B', img: B+'Semi%20.png',         autoCoins: 8 },
  { id: 'bf',     name: '보이프렌드룩',  grade: 'SSR', gradeColor: '#F59E0B', img: B+'Blue%20jin.png',      autoCoins: 8 },
  { id: 'hiphop', name: '스트릿힙합',    grade: 'SSR', gradeColor: '#F59E0B', img: B+'Hip%20pop.png',       autoCoins: 8 },
  { id: 'night',  name: '나이트폴',      grade: 'SSR', gradeColor: '#F59E0B', img: B+'You%20and%20me.png',  autoCoins: 8 },
];

// 뽑기 확률
const RATES = { UR: 3, SSR: 97 }; // UR 3%, SSR 97% (아직 SR/R/N 없으니)

// ── 화면 이동 ──
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  updateCoinsDisplay();
  if (id === 'alba') initAlba();
  if (id === 'collection') renderCollection();
  if (id === 'home') renderHomeIdols();
}

// ── 코인 업데이트 ──
function updateCoinsDisplay() {
  document.querySelectorAll('#coin-display,#coin-alba,#coin-gacha,#coin-gacha2')
    .forEach(el => { if(el) el.textContent = coins; });
}
function saveCoins() {
  localStorage.setItem('ph_coins', coins);
  localStorage.setItem('ph_owned', JSON.stringify(owned));
  localStorage.setItem('ph_alba', albaDone);
  updateCoinsDisplay();
}

// ── 알바 게임 ──
let gaugePos = 0;
let gaugeDir = 1;
let gaugeSpeed = 1.8;
let gaugeRunning = false;
let gaugeRAF;

function initAlba() {
  document.getElementById('coin-alba').textContent = coins;
  document.getElementById('alba-done').textContent = albaDone;
  renderAutoIdols();
  startGauge();
}

function startGauge() {
  if (gaugeRunning) return;
  gaugeRunning = true;
  function tick() {
    gaugePos += gaugeDir * gaugeSpeed;
    if (gaugePos >= 100) { gaugePos = 100; gaugeDir = -1; }
    if (gaugePos <= 0) { gaugePos = 0; gaugeDir = 1; }
    document.getElementById('gauge-marker').style.left = gaugePos + '%';
    gaugeRAF = requestAnimationFrame(tick);
  }
  tick();
}

function tapGauge() {
  const pos = gaugePos;
  let grade, earn;

  // 퍼펙트: 41~59%, 그레이트: 35~65%
  if (pos >= 41 && pos <= 59) {
    grade = 'PERFECT'; earn = 30;
  } else if (pos >= 35 && pos <= 65) {
    grade = 'GREAT'; earn = 20;
  } else if (pos >= 25 && pos <= 75) {
    grade = 'COOL'; earn = 10;
  } else {
    grade = 'MISS'; earn = 0;
  }

  coins += earn;
  albaDone++;
  saveCoins();
  document.getElementById('alba-done').textContent = albaDone;

  showResult(grade, earn);
  spawnCoinFloat(earn);
}

function showResult(grade, earn) {
  const colors = { PERFECT: '#FFD700', GREAT: '#FF6B9D', COOL: '#C084FC', MISS: '#666' };
  const popup = document.getElementById('result-popup');
  const bg = document.getElementById('result-bg');

  popup.style.borderColor = colors[grade];
  document.getElementById('result-grade-text').style.color = colors[grade];
  document.getElementById('result-grade-text').textContent = grade;
  document.getElementById('result-coins-text').textContent = earn > 0 ? `+🍔 ${earn}` : '다음엔 잘 할 수 있어!';
  document.getElementById('result-sub-text').textContent = earn > 0 ? `총 ${coins}코인` : '';

  popup.classList.add('show');
  bg.classList.add('show');

  setTimeout(() => {
    popup.classList.remove('show');
    bg.classList.remove('show');
  }, 900);
}

function spawnCoinFloat(earn) {
  if (earn <= 0) return;
  const el = document.createElement('div');
  el.className = 'coin-float';
  el.textContent = '+🍔' + earn;
  el.style.left = (40 + Math.random() * 20) + '%';
  el.style.top = '50%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

function renderAutoIdols() {
  const autoOwned = CARDS.filter(c => owned.includes(c.id));
  const section = document.getElementById('auto-idols-section');
  const list = document.getElementById('auto-idol-list');
  if (autoOwned.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = autoOwned.map(c =>
    `<div class="auto-idol-row">
      <div><span class="auto-idol-name">${c.name}</span> <span style="font-size:11px;color:#888;">${c.grade}</span></div>
      <div class="auto-coin">+🍔${c.autoCoins}/분</div>
    </div>`
  ).join('');

  // 자동 알바 코인 (30초마다)
  clearInterval(window._autoInterval);
  window._autoInterval = setInterval(() => {
    const total = autoOwned.reduce((s, c) => s + Math.floor(c.autoCoins / 2), 0);
    coins += total;
    saveCoins();
    spawnCoinFloat(total);
  }, 30000);
}

// ── 가챠 ──
function doDraw(count) {
  const cost = count === 1 ? 100 : 280;
  if (coins < cost) {
    alert(`코인이 부족해요! 🍔 ${cost} 필요 (현재: ${coins})`);
    return;
  }
  coins -= cost;
  saveCoins();

  // 뽑기 결과
  const result = [];
  for (let i = 0; i < count; i++) {
    result.push(drawOne());
  }

  // 첫 결과 표시 (나중에 여러 장 슬라이드로 확장 가능)
  showGachaResult(result[0]);
}

function drawOne() {
  const rand = Math.random() * 100;
  let pool;
  if (rand < 3) {
    pool = CARDS.filter(c => c.grade === 'UR');
  } else {
    pool = CARDS.filter(c => c.grade === 'SSR');
  }
  const card = pool[Math.floor(Math.random() * pool.length)];
  if (!owned.includes(card.id)) owned.push(card.id);
  saveCoins();
  return card;
}

function showGachaResult(card) {
  const overlay = document.getElementById('gacha-overlay');
  const gradeEl = document.getElementById('gacha-res-grade');
  const nameEl = document.getElementById('gacha-res-name');
  const img = document.getElementById('gacha-res-img');

  gradeEl.textContent = `✨ ${card.grade} ✨`;
  gradeEl.style.color = card.gradeColor;
  nameEl.textContent = card.name;

  if (card.img) {
    img.src = card.img;
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
    document.getElementById('gacha-res-card').innerHTML =
      `<div style="width:100%;height:100%;background:linear-gradient(135deg,#2d1b4e,#1a1a2e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;">
        <div style="font-size:64px;">🎴</div>
        <div style="font-size:20px;font-weight:900;color:${card.gradeColor};text-align:center;">${card.grade}</div>
        <div style="font-size:16px;color:#eee;text-align:center;">${card.name}</div>
      </div>`;
  }

  overlay.classList.add('show');
}

function closeGachaResult() {
  document.getElementById('gacha-overlay').classList.remove('show');
  renderHomeIdols();
}

// ── 컬렉션 ──
function renderCollection() {
  const grid = document.getElementById('collection-grid');
  const owned_count = owned.length;
  document.getElementById('collection-count').textContent = `${owned_count} / ${CARDS.length} 보유`;

  grid.innerHTML = CARDS.map(card => {
    const isOwned = owned.includes(card.id);
    return `<div class="card-item ${isOwned ? 'owned' : ''}">
      <div style="aspect-ratio:3/4;background:#1a1a2e;position:relative;overflow:hidden;" class="${isOwned ? '' : 'card-locked'}">
        ${isOwned && card.img ? `<img src="${card.img}" style="width:100%;height:100%;object-fit:cover;">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;">🎴</div>'}
        ${!isOwned ? '<div class="card-locked-overlay">🔒</div>' : ''}
      </div>
      <div class="card-item-info">
        <div class="card-item-name">${isOwned ? card.name : '???'}</div>
        <div class="card-item-grade" style="color:${isOwned ? card.gradeColor : '#ccc'}">${card.grade}</div>
      </div>
    </div>`;
  }).join('');
}

// ── 홈 아이돌 칩 ──
function renderHomeIdols() {
  const chips = document.getElementById('home-idol-chips');
  const ownedCards = CARDS.filter(c => owned.includes(c.id));
  if (ownedCards.length === 0) {
    chips.innerHTML = '<div class="empty-idol">아직 카드가 없어요 💔<br>뽑기 해봐!</div>';
    return;
  }
  chips.innerHTML = ownedCards.slice(0, 5).map(c =>
    `<div class="idol-chip"><span class="grade" style="background:${c.gradeColor}">${c.grade}</span>${c.name}</div>`
  ).join('') + (ownedCards.length > 5 ? `<div class="idol-chip">+${ownedCards.length - 5}장</div>` : '');
}

// ── 초기화 ──
updateCoinsDisplay();
renderHomeIdols();
</script>
</body>
</html>
