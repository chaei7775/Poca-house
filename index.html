<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 POCA HOUSE</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff85a1;
    --pink-light: #ffc2d0;
    --pink-pale: #fff0f3;
    --pink-deep: #e85480;
    --gem: #c084fc;
    --gem-light: #e9d5ff;
    --cream: #fff8f9;
    --dark: #3d2c35;
    --mid: #7c5c68;
    --border: #ffd6e0;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 상단 HUD */
  .hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hud-title {
    font-size: 16px; font-weight: 800; color: var(--pink-deep);
    letter-spacing: 1px;
  }
  .hud-title span { color: var(--dark); }
  .hud-gems {
    display: flex; align-items: center; gap: 6px;
    background: var(--gem-light);
    padding: 6px 14px; border-radius: 20px;
    font-weight: 800; font-size: 15px; color: #7c3aed;
  }

  /* 탭 네비 */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: #fff;
    border-top: 2px solid var(--border);
    display: flex;
  }
  .nav-btn {
    flex: 1; padding: 10px 0 8px;
    border: none; background: none; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 10px; font-weight: 700;
    color: #ccc;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--pink-deep); }
  .nav-icon { font-size: 22px; }

  /* 화면 */
  .screen {
    display: none;
    padding: 72px 16px 80px;
    min-height: 100vh;
  }
  .screen.active { display: block; }

  /* ── 알바 화면 ── */
  .alba-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .alba-char {
    width: 100%; max-width: 360px;
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 8px 30px rgba(255,133,161,0.25);
    position: relative;
  }
  .alba-char img { width: 100%; display: block; }
  .alba-char-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(61,44,53,0.7));
    padding: 20px 16px 16px;
    color: #fff;
  }
  .alba-char-name { font-size: 13px; font-weight: 700; opacity: 0.8; }
  .alba-char-msg { font-size: 15px; font-weight: 800; }

  .alba-btn {
    width: 100%; max-width: 360px;
    padding: 16px;
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    border: none; border-radius: 16px;
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 800; letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(232,84,128,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .alba-btn:active { transform: scale(0.97); }
  .alba-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .alba-timer {
    font-size: 13px; color: var(--mid); font-weight: 700;
    text-align: center;
  }

  .alba-log {
    width: 100%; max-width: 360px;
    background: #fff; border-radius: 16px;
    border: 1.5px solid var(--border);
    padding: 14px 16px;
  }
  .alba-log-title { font-size: 12px; color: var(--mid); font-weight: 700; margin-bottom: 8px; }
  .log-item {
    font-size: 13px; color: var(--dark); padding: 4px 0;
    border-bottom: 1px dashed var(--border);
    display: flex; justify-content: space-between;
  }
  .log-item:last-child { border-bottom: none; }
  .log-gem { color: #7c3aed; font-weight: 800; }

  /* ── 포카샵 화면 ── */
  .shop-header {
    text-align: center; margin-bottom: 20px;
  }
  .shop-header img {
    width: 100%; max-width: 360px; border-radius: 20px;
    box-shadow: 0 8px 30px rgba(255,133,161,0.2);
  }

  .pack-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; max-width: 360px; margin: 0 auto;
  }
  .pack-card {
    background: #fff; border-radius: 16px;
    border: 2px solid var(--border);
    padding: 16px 12px;
    text-align: center; cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .pack-card:hover { transform: translateY(-3px); border-color: var(--pink); box-shadow: 0 6px 20px rgba(255,133,161,0.2); }
  .pack-emoji { font-size: 36px; margin-bottom: 8px; }
  .pack-name { font-size: 14px; font-weight: 800; color: var(--dark); margin-bottom: 4px; }
  .pack-desc { font-size: 11px; color: var(--mid); margin-bottom: 10px; line-height: 1.4; }
  .pack-price {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--gem-light); padding: 4px 12px;
    border-radius: 20px; font-size: 14px; font-weight: 800; color: #7c3aed;
  }
  .pack-card.premium { border-color: #fbbf24; background: linear-gradient(135deg, #fffbeb, #fff); }
  .pack-card.premium .pack-price { background: #fef3c7; color: #b45309; }

  /* 구매 모달 */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(61,44,53,0.6);
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%; max-width: 480px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--mid); margin-bottom: 20px; }
  .modal-confirm {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--gem), #7c3aed);
    border: none; border-radius: 14px;
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 16px; font-weight: 800; cursor: pointer;
    margin-bottom: 10px;
  }
  .modal-cancel {
    width: 100%; padding: 12px;
    background: none; border: 1.5px solid var(--border);
    border-radius: 14px; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 700; color: var(--mid); cursor: pointer;
  }

  /* 팩 오픈 연출 */
  .open-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(20,10,20,0.92);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 20px;
  }
  .open-overlay.show { display: flex; }
  .open-pack-emoji { font-size: 80px; animation: packShake 0.4s ease; }
  @keyframes packShake {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-8deg) scale(1.1); }
    75% { transform: rotate(8deg) scale(1.1); }
  }
  .open-cards {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    max-width: 340px;
  }
  .open-card {
    width: 80px; background: #fff; border-radius: 12px;
    overflow: hidden; text-align: center;
    box-shadow: 0 4px 20px rgba(255,133,161,0.3);
    animation: cardPop 0.4s ease both;
  }
  .open-card:nth-child(1) { animation-delay: 0.1s; }
  .open-card:nth-child(2) { animation-delay: 0.2s; }
  .open-card:nth-child(3) { animation-delay: 0.3s; }
  .open-card:nth-child(4) { animation-delay: 0.4s; }
  .open-card:nth-child(5) { animation-delay: 0.5s; }
  @keyframes cardPop {
    from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .open-card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--pink-pale); display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .open-card-name { font-size: 9px; font-weight: 800; padding: 4px 2px; color: var(--dark); }
  .open-close {
    margin-top: 8px; padding: 12px 40px;
    background: var(--pink); border: none; border-radius: 30px;
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 800; cursor: pointer;
  }

  /* ── 방 꾸미기 화면 ── */
  .room-wrap { max-width: 480px; margin: 0 auto; }
  .room-scene {
    position: relative; width: 100%;
    background: linear-gradient(180deg, #ffe4ec 0%, #fff0f5 60%, #ffd6e7 100%);
    border-radius: 20px; overflow: hidden;
    border: 2px solid var(--border);
    min-height: 320px;
    margin-bottom: 16px;
  }
  /* 방 배경 데코 */
  .room-wall-deco {
    position: absolute; top: 8px; left: 8px;
    font-size: 18px; opacity: 0.4;
  }
  .room-neon {
    position: absolute; top: 12px; right: 16px;
    font-size: 28px; filter: drop-shadow(0 0 8px #ff85a1);
  }
  /* 포카 붙이는 영역 */
  .room-poca-wall {
    position: absolute; top: 16px; left: 16px;
    width: calc(100% - 32px);
    display: flex; flex-wrap: wrap; gap: 6px;
    min-height: 140px;
  }
  .room-poca-slot {
    width: 56px; height: 76px;
    border: 1.5px dashed rgba(255,133,161,0.4);
    border-radius: 8px;
    background: rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer;
    transition: background 0.2s;
    position: relative; overflow: hidden;
  }
  .room-poca-slot.filled { border-color: transparent; }
  .room-poca-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
  .room-poca-slot .slot-emoji {
    font-size: 24px; opacity: 0.3;
  }
  /* 하나 캐릭터 */
  .room-hana {
    position: absolute; bottom: 0; right: 8px;
    width: 120px;
  }
  .room-hana img { width: 100%; }
  /* 방 굿즈 */
  .room-goods {
    position: absolute; bottom: 8px; left: 12px;
    display: flex; gap: 8px; font-size: 22px;
  }

  /* 보유 포카 */
  .collection-title {
    font-size: 14px; font-weight: 800; color: var(--dark);
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .collection-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .coll-card {
    background: #fff; border-radius: 12px;
    border: 1.5px solid var(--border);
    padding: 8px 4px; text-align: center;
    cursor: pointer; transition: all 0.15s;
    position: relative;
  }
  .coll-card:hover { border-color: var(--pink); transform: scale(1.05); }
  .coll-card.selected { border-color: var(--pink-deep); box-shadow: 0 0 0 2px var(--pink-deep); }
  .coll-card-emoji { font-size: 28px; }
  .coll-card-name { font-size: 9px; font-weight: 700; color: var(--mid); margin-top: 4px; }
  .coll-card-count {
    position: absolute; top: -4px; right: -4px;
    background: var(--pink-deep); color: #fff;
    font-size: 9px; font-weight: 800;
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .place-btn {
    width: 100%; padding: 12px; margin-top: 12px;
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    border: none; border-radius: 14px;
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 800; cursor: pointer;
  }
  .place-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--dark); color: #fff;
    padding: 10px 20px; border-radius: 30px;
    font-size: 13px; font-weight: 700;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap; z-index: 500;
  }
  .toast.show { opacity: 1; }

  /* 하트 파티클 */
  .heart-particle {
    position: fixed; pointer-events: none;
    font-size: 20px; z-index: 400;
    animation: heartFloat 1s ease-out forwards;
  }
  @keyframes heartFloat {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
  }

  .empty-coll {
    text-align: center; padding: 30px 0;
    color: var(--mid); font-size: 14px; font-weight: 700;
  }
</style>
</head>
<body>

<!-- HUD -->
<div class="hud">
  <div class="hud-title">🏠 POCA<span>HOUSE</span></div>
  <div class="hud-gems">💎 <span id="gem-count">0</span></div>
</div>

<!-- 화면들 -->

<!-- 1. 알바 -->
<div class="screen active" id="screen-alba">
  <div class="alba-wrap">
    <div class="alba-char">
      <img src="https://raw.githubusercontent.com/chaei7775/Poca-house/main/file_0000000018f07206b5d23c4988ae3a84.png" alt="하나 알바" id="alba-img" style="width:100%;display:block;">
      <div class="alba-char-overlay">
        <div class="alba-char-name">포카버거 알바생 하나</div>
        <div class="alba-char-msg" id="alba-msg">열심히 일해서 포카 살거야! 💪</div>
      </div>
    </div>

    <button class="alba-btn" id="alba-btn" onclick="doAlba()">
      🍔 알바하기 (+💎<span id="alba-reward">50</span>)
    </button>
    <div class="alba-timer" id="alba-timer"></div>

    <div class="alba-log" id="alba-log">
      <div class="alba-log-title">💼 오늘의 알바 기록</div>
      <div id="log-list">
        <div class="log-item" style="color:#ccc; font-size:12px;">아직 알바 기록이 없어요...</div>
      </div>
    </div>
  </div>
</div>

<!-- 2. 포카샵 -->
<div class="screen" id="screen-shop">
  <div class="shop-header">
    <img src="https://raw.githubusercontent.com/chaei7775/Poca-house/main/file_00000000a9007206b6ff42e83fd8f5ab.png" alt="포카샵 하나" style="width:100%;max-width:360px;border-radius:20px;box-shadow:0 8px 30px rgba(255,133,161,0.2);margin-bottom:16px;display:block;margin-left:auto;margin-right:auto;">
    <div style="font-size:22px; font-weight:800; color:var(--pink-deep); margin-bottom:4px;">💝 포카 샵</div>
    <div style="font-size:13px; color:var(--mid); margin-bottom:16px;">알바해서 모은 💎으로 포카팩을 구매해요!</div>
  </div>

  <div class="pack-grid">
    <div class="pack-card" onclick="openModal('lovely')">
      <div class="pack-emoji">🩷</div>
      <div class="pack-name">러블리 팩</div>
      <div class="pack-desc">포카 3장<br>기본 등급 위주</div>
      <div class="pack-price">💎 100</div>
    </div>
    <div class="pack-card" onclick="openModal('special')">
      <div class="pack-emoji">💜</div>
      <div class="pack-name">스페셜 팩</div>
      <div class="pack-desc">포카 5장<br>레어 확률 UP!</div>
      <div class="pack-price">💎 300</div>
    </div>
    <div class="pack-card premium" onclick="openModal('premium')">
      <div class="pack-emoji">👑</div>
      <div class="pack-name">프리미엄 팩</div>
      <div class="pack-desc">포카 7장<br>SSR 보장!</div>
      <div class="pack-price">💎 500</div>
    </div>
    <div class="pack-card" onclick="openModal('daily')" style="border-color:#86efac; background:linear-gradient(135deg,#f0fdf4,#fff);">
      <div class="pack-emoji">🌿</div>
      <div class="pack-name">데일리 팩</div>
      <div class="pack-desc">포카 2장<br>매일 1회 한정!</div>
      <div class="pack-price" style="background:#dcfce7; color:#166534;">💎 50</div>
    </div>
  </div>
</div>

<!-- 3. 방 꾸미기 -->
<div class="screen" id="screen-room">
  <div class="room-wrap">
    <div class="room-scene" id="room-scene">
      <div class="room-wall-deco">⭐🌸⭐</div>
      <div class="room-neon">🩷</div>
      <div class="room-poca-wall" id="poca-wall"></div>
      <div class="room-hana">
        <img src="https://raw.githubusercontent.com/chaei7775/Poca-house/main/file_00000000d44c720985c5fe9ed5dbd24c.png" alt="하나" style="width:100%;border-radius:12px;">
      </div>
      <div class="room-goods">🪄 🐰 💡</div>
    </div>

    <div class="collection-title">🗂️ 내 포카 컬렉션 <span style="color:var(--mid); font-weight:600; font-size:12px;" id="coll-count">(0장)</span></div>
    <div class="collection-grid" id="coll-grid">
      <div class="empty-coll" style="grid-column:1/-1;">포카가 없어요 😢<br><small>포카샵에서 팩을 열어보세요!</small></div>
    </div>
    <button class="place-btn" id="place-btn" onclick="placeSelected()" disabled>
      📌 선택한 포카 벽에 붙이기
    </button>
  </div>
</div>

<!-- 구매 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <button class="modal-confirm" id="modal-confirm" onclick="buyPack()">구매하기 💎</button>
    <button class="modal-cancel" onclick="closeModal()">취소</button>
  </div>
</div>

<!-- 팩 오픈 연출 -->
<div class="open-overlay" id="open-overlay">
  <div style="color:#fff; font-size:20px; font-weight:800; letter-spacing:2px;">✨ 포카 오픈! ✨</div>
  <div class="open-pack-emoji" id="open-pack-emoji"></div>
  <div class="open-cards" id="open-cards"></div>
  <button class="open-close" onclick="closeOpenOverlay()">내 포카 보러가기 🏠</button>
</div>

<!-- 탭 네비 -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('alba', this)">
    <span class="nav-icon">🍔</span>알바
  </button>
  <button class="nav-btn" onclick="switchTab('shop', this)">
    <span class="nav-icon">🛍️</span>포카샵
  </button>
  <button class="nav-btn" onclick="switchTab('room', this)">
    <span class="nav-icon">🏠</span>내 방
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── 데이터 ──────────────────────────────────────
const POCA_POOL = [
  // 일반
  { id:'c1', name:'민준', rarity:'N', emoji:'🧑', color:'#e2e8f0' },
  { id:'c2', name:'지호', rarity:'N', emoji:'👦', color:'#e2e8f0' },
  { id:'c3', name:'서준', rarity:'N', emoji:'🙂', color:'#e2e8f0' },
  { id:'c4', name:'현우', rarity:'N', emoji:'😊', color:'#e2e8f0' },
  // 레어
  { id:'c5', name:'도윤', rarity:'R', emoji:'😍', color:'#bfdbfe' },
  { id:'c6', name:'태양', rarity:'R', emoji:'🌟', color:'#bfdbfe' },
  { id:'c7', name:'이준', rarity:'R', emoji:'💙', color:'#bfdbfe' },
  // SSR
  { id:'c8', name:'주혁', rarity:'SSR', emoji:'💜', color:'#e9d5ff' },
  { id:'c9', name:'시우', rarity:'SSR', emoji:'👑', color:'#e9d5ff' },
  // UR
  { id:'c10', name:'에이스', rarity:'UR', emoji:'💎', color:'#fef3c7' },
];

const PACK_INFO = {
  lovely:  { name:'러블리 팩 🩷', emoji:'🩷', cost:100,  count:3, rates:{ N:0.7, R:0.25, SSR:0.04, UR:0.01 } },
  special: { name:'스페셜 팩 💜', emoji:'💜', cost:300,  count:5, rates:{ N:0.5, R:0.35, SSR:0.12, UR:0.03 } },
  premium: { name:'프리미엄 팩 👑', emoji:'👑', cost:500, count:7, rates:{ N:0.3, R:0.35, SSR:0.25, UR:0.1 }, ssrGuarantee:true },
  daily:   { name:'데일리 팩 🌿', emoji:'🌿', cost:50,   count:2, rates:{ N:0.75, R:0.2, SSR:0.04, UR:0.01 } },
};

// 알바 메시지
const ALBA_MSGS = [
  "주문 들어왔어요! 빨리빨리~ 🍔",
  "오늘도 화이팅! 포카 살 거야 💪",
  "손님이 많다... 그래도 열심히! 😤",
  "패티 뒤집기 완료! 💫",
  "알바비 모이는 중~ 조금만 더! 🌟",
  "오늘 팁 받았어요!! 감사합니다 🙏",
  "쉬는 시간에 최애 생각함 ❤️",
];

let gems = parseInt(localStorage.getItem('ph_gems') || '0');
let collection = JSON.parse(localStorage.getItem('ph_collection') || '[]');
let wallPocas = JSON.parse(localStorage.getItem('ph_wall') || '[]');
let albaCount = 0;
let albaTimer = null;
let currentPack = null;
let selectedCardId = null;
let albaLogs = [];

function save() {
  localStorage.setItem('ph_gems', gems);
  localStorage.setItem('ph_collection', JSON.stringify(collection));
  localStorage.setItem('ph_wall', JSON.stringify(wallPocas));
}

function updateGems() {
  document.getElementById('gem-count').textContent = gems;
}

// ── 탭 전환 ──────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'room') renderRoom();
}

// ── 알바 ──────────────────────────────────────────
function doAlba() {
  const btn = document.getElementById('alba-btn');
  const reward = 30 + Math.floor(Math.random() * 50);
  gems += reward;
  albaCount++;
  save();
  updateGems();

  // 메시지 변경
  const msg = ALBA_MSGS[Math.floor(Math.random() * ALBA_MSGS.length)];
  document.getElementById('alba-msg').textContent = msg;

  // 로그 추가
  addLog(`알바 ${albaCount}회`, `+💎${reward}`);

  // 버튼 쿨다운
  btn.disabled = true;
  let sec = 5;
  document.getElementById('alba-timer').textContent = `${sec}초 후 다시 알바 가능`;
  albaTimer = setInterval(() => {
    sec--;
    if (sec <= 0) {
      clearInterval(albaTimer);
      btn.disabled = false;
      document.getElementById('alba-timer').textContent = '';
    } else {
      document.getElementById('alba-timer').textContent = `${sec}초 후 다시 알바 가능`;
    }
  }, 1000);

  // 하트 파티클
  spawnHearts();
  toast(`+💎${reward} 획득!`);
}

function addLog(label, gem) {
  albaLogs.unshift({ label, gem });
  if (albaLogs.length > 5) albaLogs.pop();
  const list = document.getElementById('log-list');
  list.innerHTML = albaLogs.map(l => `
    <div class="log-item">
      <span>${l.label}</span>
      <span class="log-gem">${l.gem}</span>
    </div>
  `).join('');
}

// ── 포카샵 모달 ───────────────────────────────────
function openModal(packId) {
  const p = PACK_INFO[packId];
  currentPack = packId;
  document.getElementById('modal-title').textContent = p.name;
  document.getElementById('modal-sub').textContent = `포카 ${p.count}장 | 💎 ${p.cost} 필요 | 현재 보유: 💎${gems}`;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  currentPack = null;
}

function buyPack() {
  const p = PACK_INFO[currentPack];
  if (gems < p.cost) { toast('💎이 부족해요! 알바를 더 해요 🍔'); closeModal(); return; }
  gems -= p.cost;
  save();
  updateGems();
  closeModal();

  // 카드 뽑기
  const drawn = [];
  let hasSSR = false;
  for (let i = 0; i < p.count; i++) {
    const card = drawPoca(p.rates);
    if (card.rarity === 'SSR' || card.rarity === 'UR') hasSSR = true;
    drawn.push(card);
    addToCollection(card);
  }
  // SSR 보장
  if (p.ssrGuarantee && !hasSSR) {
    const ssrCards = POCA_POOL.filter(c => c.rarity === 'SSR');
    const bonus = ssrCards[Math.floor(Math.random() * ssrCards.length)];
    drawn[drawn.length - 1] = bonus;
    addToCollection(bonus);
  }
  save();
  showOpenOverlay(p.emoji, drawn);
}

function drawPoca(rates) {
  const r = Math.random();
  let rarity = 'N';
  if (r < rates.UR) rarity = 'UR';
  else if (r < rates.UR + rates.SSR) rarity = 'SSR';
  else if (r < rates.UR + rates.SSR + rates.R) rarity = 'R';
  const pool = POCA_POOL.filter(c => c.rarity === rarity);
  return pool[Math.floor(Math.random() * pool.length)];
}

function addToCollection(card) {
  const existing = collection.find(c => c.id === card.id);
  if (existing) existing.count++;
  else collection.push({ ...card, count: 1 });
}

// ── 팩 오픈 연출 ──────────────────────────────────
function showOpenOverlay(emoji, cards) {
  document.getElementById('open-pack-emoji').textContent = emoji;
  const container = document.getElementById('open-cards');
  container.innerHTML = cards.map(c => `
    <div class="open-card">
      <div class="open-card-img" style="background:${c.color};">${c.emoji}</div>
      <div class="open-card-name">${c.name}<br><span style="color:${rarityColor(c.rarity)}">${c.rarity}</span></div>
    </div>
  `).join('');
  document.getElementById('open-overlay').classList.add('show');
}

function rarityColor(r) {
  return { N:'#94a3b8', R:'#3b82f6', SSR:'#a855f7', UR:'#f59e0b' }[r] || '#94a3b8';
}

function closeOpenOverlay() {
  document.getElementById('open-overlay').classList.remove('show');
  // 방 탭으로
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-room').classList.add('active');
  document.querySelectorAll('.nav-btn')[2].classList.add('active');
  renderRoom();
}

// ── 방 꾸미기 ──────────────────────────────────────
const WALL_SLOTS = 8;

function renderRoom() {
  // 포카 벽
  const wall = document.getElementById('poca-wall');
  wall.innerHTML = '';
  for (let i = 0; i < WALL_SLOTS; i++) {
    const slot = document.createElement('div');
    slot.className = 'room-poca-slot' + (wallPocas[i] ? ' filled' : '');
    if (wallPocas[i]) {
      const card = POCA_POOL.find(c => c.id === wallPocas[i]);
      if (card) {
        const inner = document.createElement('div');
        inner.style.cssText = `width:100%;height:100%;background:${card.color};display:flex;align-items:center;justify-content:center;font-size:28px;border-radius:6px;`;
        inner.textContent = card.emoji;
        slot.appendChild(inner);
      }
    } else {
      const ph = document.createElement('span');
      ph.className = 'slot-emoji';
      ph.textContent = '📷';
      slot.appendChild(ph);
    }
    wall.appendChild(slot);
  }

  // 컬렉션
  const grid = document.getElementById('coll-grid');
  const count = collection.reduce((a, c) => a + c.count, 0);
  document.getElementById('coll-count').textContent = `(${count}장)`;
  if (collection.length === 0) {
    grid.innerHTML = '<div class="empty-coll" style="grid-column:1/-1;">포카가 없어요 😢<br><small>포카샵에서 팩을 열어보세요!</small></div>';
    return;
  }
  grid.innerHTML = collection.map(c => `
    <div class="coll-card ${selectedCardId === c.id ? 'selected' : ''}" onclick="selectCard('${c.id}')">
      <div class="coll-card-emoji">${c.emoji}</div>
      <div class="coll-card-name">${c.name}<br><span style="color:${rarityColor(c.rarity)};font-weight:800;">${c.rarity}</span></div>
      <div class="coll-card-count">${c.count}</div>
    </div>
  `).join('');
  document.getElementById('place-btn').disabled = !selectedCardId;
}

function selectCard(id) {
  selectedCardId = selectedCardId === id ? null : id;
  renderRoom();
}

function placeSelected() {
  if (!selectedCardId) return;
  const emptySlot = wallPocas.indexOf(undefined);
  const nextSlot = wallPocas.length < WALL_SLOTS ? wallPocas.length : -1;
  const slot = emptySlot >= 0 ? emptySlot : (nextSlot >= 0 ? nextSlot : -1);

  if (wallPocas.length >= WALL_SLOTS && !wallPocas.includes(undefined)) {
    toast('벽이 꽉 찼어요! 🏠'); return;
  }

  if (emptySlot >= 0) wallPocas[emptySlot] = selectedCardId;
  else wallPocas.push(selectedCardId);

  const card = collection.find(c => c.id === selectedCardId);
  save();
  spawnHearts();
  toast(`${card.name} 포카 붙였어요! 📌`);
  selectedCardId = null;
  renderRoom();
}

// ── 유틸 ──────────────────────────────────────────
function spawnHearts() {
  const emojis = ['🩷','💜','⭐','✨','💖'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'heart-particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (20 + Math.random() * 60) + '%';
      el.style.bottom = '80px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }, i * 100);
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 초기화 ────────────────────────────────────────
updateGems();
renderRoom();
</script>
</body>
</html>
