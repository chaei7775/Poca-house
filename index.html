<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>POCA HOUSE BURGER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --pink: #FF6B9D; --pink-light: #FFB3CC; --pink-pale: #FFF0F5; --purple: #C084FC; --gold: #F59E0B; --dark: #1a1a2e; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--pink-pale); min-height: 100vh; max-width: 430px; margin: 0 auto; overflow-x: hidden; }
  .screen { display: none; min-height: 100vh; flex-direction: column; padding-bottom: 70px; }
  .screen.active { display: flex; }
  .topbar { background: linear-gradient(135deg, #FF6B9D, #C084FC); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px #FF6B9D44; }
  .topbar-logo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 18px; color: #fff; }
  .topbar-logo span { color: #FFE4EF; }
  .coins { background: rgba(255,255,255,0.25); border-radius: 20px; padding: 4px 12px; font-size: 14px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 4px; }

  /* HOME */
  #screen-home { background: linear-gradient(180deg, #FFF0F5 0%, #FFE4EF 100%); }
  .home-banner { position: relative; width: 100%; height: 240px; overflow: hidden; background: #FFD6E8; }
  .home-banner img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .home-banner-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 16px 12px; background: linear-gradient(to top, #FFF0F5ee, transparent); }
  .home-banner-title { font-size: 22px; font-weight: 900; color: var(--pink); text-shadow: 0 1px 8px #fff8; }
  .home-banner-sub { font-size: 12px; color: #FF6B9D99; margin-top: 2px; }
  
  /* 홈 말풍선 */
  .home-speech { padding: 12px 16px 0; }
  .speech-bubble-wrap { display: flex; align-items: flex-end; gap: 10px; }
  .speech-char-img { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid var(--pink-light); background: #FFD6E8; flex-shrink: 0; }
  .speech-char-placeholder { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #FFB3CC, #C084FC); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .speech-bubble { background: #fff; border: 1.5px solid var(--pink-light); border-radius: 16px 16px 16px 4px; padding: 10px 14px; font-size: 13px; color: #555; line-height: 1.5; position: relative; box-shadow: 0 2px 8px #FF6B9D11; max-width: calc(100% - 72px); }
  .speech-name { font-size: 11px; font-weight: 700; color: var(--pink); margin-bottom: 3px; }

  .home-actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .btn-main { width: 100%; padding: 15px; border: none; border-radius: 16px; font-size: 16px; font-weight: 900; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-main:active { transform: scale(0.97); }
  .btn-alba { background: linear-gradient(135deg, #FF6B9D, #FF8FAB); color: #fff; box-shadow: 0 4px 20px #FF6B9D55; }
  .btn-gacha { background: linear-gradient(135deg, #C084FC, #A855F7); color: #fff; box-shadow: 0 4px 20px #C084FC55; }
  .btn-collection { background: #fff; color: var(--pink); border: 2px solid var(--pink-light); }
  .idol-preview { padding: 0 16px 16px; }
  .section-title { font-size: 13px; font-weight: 700; color: #FF6B9D99; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .idol-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .idol-chip { background: #fff; border: 1.5px solid var(--pink-light); border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 700; color: var(--pink); display: flex; align-items: center; gap: 4px; }
  .idol-chip .grade { font-size: 10px; background: linear-gradient(135deg, #C084FC, #A855F7); color: #fff; border-radius: 6px; padding: 1px 5px; }
  .empty-idol { font-size: 13px; color: #FFB3CC; padding: 8px 0; }

  /* ALBA */
  #screen-alba { position: relative; overflow: hidden; background: #1a1a2e; }
  .alba-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('https://raw.githubusercontent.com/chaei7775/Poca-house/main/burger-main.png'); background-size: cover; background-position: center top; opacity: 0.5; }
  .alba-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; gap: 16px; min-height: 100vh; }
  .alba-title { font-size: 20px; font-weight: 900; color: #fff; text-align: center; text-shadow: 0 2px 8px #0008; }
  .alba-subtitle { font-size: 12px; color: #FFB3CC; text-align: center; margin-top: -12px; }
  .gauge-container { width: 100%; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; backdrop-filter: blur(6px); }
  .gauge-label { font-size: 13px; color: #FFB3CC; font-weight: 700; letter-spacing: 1px; }
  .gauge-track { width: 100%; height: 36px; background: rgba(255,255,255,0.15); border-radius: 18px; position: relative; overflow: hidden; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); }
  .gauge-perfect { position: absolute; top: 0; bottom: 0; background: linear-gradient(90deg, #FFD700aa, #FFD700, #FFD700aa); border-radius: 4px; width: 18%; left: 41%; }
  .gauge-great { position: absolute; top: 0; bottom: 0; background: linear-gradient(90deg, #FF6B9Daa, #FF6B9D, #FF6B9Daa); border-radius: 4px; width: 30%; left: 35%; }
  .gauge-marker { position: absolute; top: 4px; bottom: 4px; width: 6px; background: #fff; border-radius: 3px; box-shadow: 0 0 12px #fff, 0 0 4px #FFD700; left: 0; }
  .gauge-zones { display: flex; gap: 12px; font-size: 11px; font-weight: 700; }
  .zone { display: flex; align-items: center; gap: 4px; }
  .zone-dot { width: 10px; height: 10px; border-radius: 50%; }
  .tap-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #FF6B9D, #C084FC); border: none; border-radius: 16px; color: #fff; font-size: 20px; font-weight: 900; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; box-shadow: 0 4px 20px #FF6B9D55; }
  .tap-btn:active { transform: scale(0.96); }
  .alba-count { background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); border-radius: 12px; padding: 10px 20px; text-align: center; width: 100%; border: 1px solid rgba(255,255,255,0.15); }
  .alba-count-num { font-size: 28px; font-weight: 900; color: #fff; }
  .alba-count-label { font-size: 11px; color: #FFB3CC; margin-top: 2px; }
  .auto-idols { width: 100%; background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.15); }
  .auto-idol-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 13px; color: #eee; }
  .auto-idol-row:last-child { border-bottom: none; }
  .auto-idol-name { font-weight: 700; color: #C084FC; }
  .auto-coin { color: var(--gold); font-weight: 700; font-size: 12px; }
  .back-btn { width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 14px; color: #fff; font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }

  /* GACHA */
  #screen-gacha { position: relative; overflow: hidden; background: linear-gradient(180deg, #1a1a2e 0%, #2d1b4e 100%); }
  .gacha-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('https://raw.githubusercontent.com/chaei7775/Poca-house/main/burger-order.png'); background-size: cover; background-position: center top; opacity: 0.18; }
  .gacha-inner { position: relative; z-index: 1; width: 100%; padding-bottom: 32px; }
  .gacha-header { padding: 20px 16px 0; text-align: center; }
  .gacha-title { font-size: 24px; font-weight: 900; font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #C084FC, #FF6B9D); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
  .gacha-sub { font-size: 12px; color: #C084FC88; margin-top: 4px; }
  .gacha-coins-display { background: rgba(192,132,252,0.15); border: 1.5px solid #C084FC44; border-radius: 12px; padding: 10px 16px; margin: 16px; text-align: center; font-size: 15px; color: var(--gold); font-weight: 700; }
  .gacha-card-area { padding: 0 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .gacha-card { width: 100%; max-width: 280px; aspect-ratio: 3/4; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 40px #C084FC44; background: #2d1b4e; display: flex; align-items: center; justify-content: center; }
  .gacha-card-back { width: 100%; height: 100%; background: linear-gradient(135deg, #2d1b4e, #1a1a2e); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .gacha-card-back-logo { font-size: 32px; font-weight: 900; font-family: 'Nunito', sans-serif; color: #C084FC44; letter-spacing: 4px; }
  .gacha-card-back-icon { font-size: 48px; opacity: 0.3; }
  .gacha-btn-row { display: flex; gap: 10px; padding: 0 16px; width: 100%; }
  .gacha-btn { flex: 1; padding: 14px; border: none; border-radius: 14px; font-size: 14px; font-weight: 900; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  .gacha-btn:active { transform: scale(0.97); }
  .gacha-btn-1 { background: rgba(192,132,252,0.2); border: 1.5px solid #C084FC; color: #C084FC; }
  .gacha-btn-3 { background: linear-gradient(135deg, #C084FC, #A855F7); color: #fff; box-shadow: 0 4px 16px #C084FC44; }
  .gacha-cost { font-size: 11px; opacity: 0.8; font-weight: 400; }
  .gacha-result-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.92); z-index: 300; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 24px; }
  .gacha-result-overlay.show { display: flex; }
  .gacha-result-card { width: 240px; aspect-ratio: 3/4; border-radius: 16px; overflow: hidden; box-shadow: 0 0 60px #C084FC88; animation: cardReveal 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .gacha-result-card img { width: 100%; height: 100%; object-fit: cover; }
  @keyframes cardReveal { from { transform: rotateY(90deg) scale(0.8); opacity: 0; } to { transform: rotateY(0deg) scale(1); opacity: 1; } }
  .gacha-result-grade { font-size: 28px; font-weight: 900; font-family: 'Nunito', sans-serif; text-align: center; }
  .gacha-result-name { font-size: 18px; font-weight: 700; color: #fff; text-align: center; }
  .gacha-close-btn { padding: 14px 40px; background: linear-gradient(135deg, #FF6B9D, #C084FC); border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 900; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }

  /* COLLECTION */
  #screen-collection { background: var(--pink-pale); }
  .collection-header { padding: 20px 16px 12px; background: linear-gradient(135deg, #FF6B9D, #C084FC); }
  .collection-title { font-size: 20px; font-weight: 900; color: #fff; font-family: 'Nunito', sans-serif; }
  .collection-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  .collection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
  .card-item { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px #FF6B9D22; position: relative; }
  .card-item-info { padding: 8px 10px; }
  .card-item-name { font-size: 13px; font-weight: 700; color: #333; }
  .card-item-grade { font-size: 11px; font-weight: 700; margin-top: 2px; }
  .card-locked { filter: grayscale(1) brightness(0.4); }
  .card-locked-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; background: rgba(0,0,0,0.3); }

  /* ── 인연 SCREEN ── */
  #screen-bond { background: linear-gradient(180deg, #1a1a2e 0%, #2d1b4e 100%); }
  .bond-header { padding: 20px 16px 12px; background: linear-gradient(135deg, #C084FC, #FF6B9D); }
  .bond-header-title { font-size: 20px; font-weight: 900; color: #fff; font-family: 'Nunito', sans-serif; }
  .bond-header-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }

  .bond-list { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .bond-card { background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12); border-radius: 18px; overflow: hidden; cursor: pointer; transition: transform 0.15s; }
  .bond-card:active { transform: scale(0.98); }
  .bond-card-top { display: flex; align-items: center; gap: 14px; padding: 14px; }
  .bond-char-img { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0; }
  .bond-char-placeholder { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #FF6B9D, #C084FC); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
  .bond-info { flex: 1; }
  .bond-name { font-size: 16px; font-weight: 900; color: #fff; }
  .bond-grade-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-top: 2px; }
  .bond-desc { font-size: 11px; color: #aaa; margin-top: 4px; line-height: 1.4; }
  .bond-heart-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .bond-hearts { display: flex; gap: 3px; }
  .heart { font-size: 16px; }
  .bond-level-text { font-size: 11px; color: #FFB3CC; font-weight: 700; }
  .bond-locked-tag { font-size: 11px; color: #666; font-style: italic; }

  /* 인연 상세 오버레이 */
  .bond-detail-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,20,0.97); z-index: 400; flex-direction: column; overflow-y: auto; }
  .bond-detail-overlay.show { display: flex; }
  .bond-detail-header { position: relative; width: 100%; height: 280px; overflow: hidden; flex-shrink: 0; }
  .bond-detail-header img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  .bond-detail-header-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #0a0a14 30%, transparent); }
  .bond-detail-back { position: absolute; top: 16px; left: 16px; background: rgba(0,0,0,0.5); border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; padding: 8px 14px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .bond-detail-name { position: absolute; bottom: 16px; left: 16px; font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 2px 8px #0008; }
  .bond-detail-body { padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; flex: 1; }

  /* 호감도 바 */
  .bond-affection { background: rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; }
  .bond-affection-title { font-size: 13px; font-weight: 700; color: #FFB3CC; letter-spacing: 1px; margin-bottom: 12px; }
  .affection-hearts { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
  .affection-heart { font-size: 28px; transition: transform 0.2s; cursor: pointer; }
  .affection-heart.active { transform: scale(1.15); }
  .affection-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
  .affection-fill { height: 100%; background: linear-gradient(90deg, #FF6B9D, #C084FC); border-radius: 4px; transition: width 0.4s ease; }
  .affection-label { text-align: center; font-size: 12px; color: #888; margin-top: 8px; }

  /* 스토리 */
  .bond-stories { background: rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; }
  .bond-stories-title { font-size: 13px; font-weight: 700; color: #FFB3CC; letter-spacing: 1px; margin-bottom: 12px; }
  .story-item { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.08); }
  .story-item:last-child { margin-bottom: 0; }
  .story-item.locked { opacity: 0.4; cursor: default; }
  .story-item-top { display: flex; align-items: center; justify-content: space-between; }
  .story-ep { font-size: 12px; font-weight: 700; color: #C084FC; }
  .story-lock { font-size: 14px; }
  .story-title-text { font-size: 14px; font-weight: 700; color: #fff; margin-top: 4px; }
  .story-preview { font-size: 12px; color: #888; margin-top: 4px; line-height: 1.4; }

  /* 스토리 읽기 오버레이 */
  .story-read-overlay { display: none; position: fixed; inset: 0; background: rgba(5,5,15,0.98); z-index: 500; flex-direction: column; }
  .story-read-overlay.show { display: flex; }
  .story-read-header { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  .story-read-back { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
  .story-read-title { font-size: 15px; font-weight: 700; color: #fff; }
  .story-read-body { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
  .story-msg { display: flex; flex-direction: column; gap: 4px; }
  .story-msg-name { font-size: 11px; font-weight: 700; color: #C084FC; }
  .story-msg-bubble { background: rgba(255,255,255,0.07); border-radius: 12px 12px 12px 4px; padding: 12px 14px; font-size: 14px; color: #eee; line-height: 1.6; max-width: 85%; border: 1px solid rgba(255,255,255,0.1); }
  .story-msg.player .story-msg-bubble { background: rgba(255,107,157,0.15); border-radius: 12px 12px 4px 12px; align-self: flex-end; border-color: rgba(255,107,157,0.2); }
  .story-msg.player .story-msg-name { text-align: right; color: #FF6B9D; }
  .story-read-footer { padding: 16px; flex-shrink: 0; }
  .story-next-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #C084FC, #FF6B9D); border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }

  /* NAVBAR */
  .navbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #fff; border-top: 1.5px solid #FFE4EF; display: flex; z-index: 100; box-shadow: 0 -4px 20px #FF6B9D22; }
  .nav-item { flex: 1; padding: 8px 0 6px; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; border: none; background: none; font-family: 'Noto Sans KR', sans-serif; color: #FFB3CC; }
  .nav-item.active { color: var(--pink); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 9px; font-weight: 700; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeInUp 0.3s ease both; }
  .result-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; }
  .result-bg.show { display: block; }
  .result-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: rgba(26,26,46,0.95); border: 2px solid; border-radius: 20px; padding: 24px 32px; text-align: center; z-index: 200; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); min-width: 200px; }
  .result-popup.show { transform: translate(-50%, -50%) scale(1); }
  .result-grade { font-size: 36px; font-weight: 900; font-family: 'Nunito', sans-serif; letter-spacing: 2px; }
  .result-coins { font-size: 16px; color: var(--gold); font-weight: 700; margin-top: 4px; }
  .result-sub { font-size: 12px; color: #888; margin-top: 4px; }
  .coin-float { position: fixed; font-size: 18px; font-weight: 900; color: var(--gold); pointer-events: none; z-index: 500; animation: floatUp 1s ease forwards; }
  @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-60px); } }
  @keyframes pulse { 0%,100%{opacity:0.6;transform:scale(1);} 50%{opacity:1;transform:scale(1.05);} }
  @keyframes popIn { from{transform:scale(0);opacity:0;} to{transform:scale(1);opacity:1;} }
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="topbar">
    <div class="topbar-logo">POCA<span>HOUSE</span></div>
    <div class="coins">🍔 <span id="coin-display">0</span></div>
  </div>
  <div class="home-banner">
    <img src="https://raw.githubusercontent.com/chaei7775/Poca-house/main/burger-main.png" alt="포카하우스" onerror="this.style.display='none'">
    <div class="home-banner-overlay">
      <div class="home-banner-title" id="home-title">오늘도 알바 가자! 🎀</div>
      <div class="home-banner-sub">열심히 일하고 아이돌 카드 뽑아봐</div>
    </div>
  </div>

  <!-- 말풍선 -->
  <div class="home-speech">
    <div class="speech-bubble-wrap" id="speech-wrap">
      <div class="speech-char-placeholder" id="speech-char">💫</div>

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const screen = document.getElementById('screen-'+id);
  if(!screen) return;
  screen.classList.add('active');
  const nav = document.getElementById('nav-'+id);
  if(nav) nav.classList.add('active');
  else if(id==='alba-burger'||id==='alba-cafe') document.getElementById('nav-alba').classList.add('active');

  const nameEl = document.getElementById('speech-name');

    return;
  }
  const cid = ownedChars[Math.floor(Math.random() * ownedChars.length)];
  const ch = CHARS[cid];
  const line = ch.homeLines[Math.floor(Math.random() * ch.homeLines.length)];
  nameEl.textContent = ch.name;

  charEl.style.background = `linear-gradient(135deg, ${ch.gradeColor}88, ${ch.gradeColor})`;

  const pos = gaugePos;
  let grade, earn;
  if (pos>=41&&pos<=59){grade='PERFECT';earn=30;}
  else if (pos>=35&&pos<=65){grade='GREAT';earn=20;}
  else if (pos>=25&&pos<=75){grade='COOL';earn=10;}
  else{grade='MISS';earn=0;}
  coins+=earn; albaDone++;
  saveAll();
  if(document.getElementById('alba-done')) document.getElementById('alba-done').textContent = albaDone;
  if(document.getElementById('alba-done-burger')) document.getElementById('alba-done-burger').textContent = albaDone;
  if(document.getElementById('coin-alba-burger')) document.getElementById('coin-alba-burger').textContent = coins;
  showResult(grade,earn);
  spawnCoinFloat(earn);
}
function showResult(grade,earn) {
  const colors={PERFECT:'#FFD700',GREAT:'#FF6B9D',COOL:'#C084FC',MISS:'#666'};
  const popup=document.getElementById('result-popup');
  const bg=document.getElementById('result-bg');
  popup.style.borderColor=colors[grade];
  document.getElementById('result-grade-text').style.color=colors[grade];
  document.getElementById('result-grade-text').textContent=grade;
  document.getElementById('result-coins-text').textContent=earn>0?`+🍔 ${earn}`:'다음엔 잘 할 수 있어!';
  document.getElementById('result-sub-text').textContent=earn>0?`총 ${coins}코인`:'';
  popup.classList.add('show'); bg.classList.add('show');
  setTimeout(()=>{popup.classList.remove('show');bg.classList.remove('show');},900);
}
function spawnCoinFloat(earn) {
  if(earn<=0)return;
  const el=document.createElement('div');
  el.className='coin-float'; el.textContent='+🍔'+earn;
  el.style.left=(40+Math.random()*20)+'%'; el.style.top='50%';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1100);
}
function renderAutoIdols() {
  const autoOwned=CARDS.filter(c=>owned.includes(c.id));

  const list=document.getElementById('auto-idol-list');

  section.style.display='block';

// 가챠
function doDraw(count) {
  const cost=count===1?100:280;
  if(coins<cost){alert(`코인이 부족해요! 🍔 ${cost} 필요 (현재: ${coins})`);return;}
  coins-=cost; saveAll();
  const results=[];
  for(let i=0;i<count;i++) results.push(drawOne());
  showGachaResult(results[0]);
}
function drawOne() {
  const rand=Math.random()*100;
  let pool;
  if(rand<3) pool=CARDS.filter(c=>c.grade==='UR');
  else if(rand<20) pool=CARDS.filter(c=>c.grade==='SR');
  else pool=CARDS.filter(c=>c.grade==='SSR');
  const card=pool[Math.floor(Math.random()*pool.length)];
  if(!owned.includes(card.id)){
    owned.push(card.id);
    // 캐릭터 카드면 호감도 올리기
    if(card.charId) {
      if(!affection[card.charId]) affection[card.charId]=0;
      affection[card.charId]=Math.min(5,affection[card.charId]+1);
    }
  }
  saveAll(); return card;
}
function showGachaResult(card) {
  document.getElementById('gacha-res-grade').textContent=`✨ ${card.grade} ✨`;
  document.getElementById('gacha-res-grade').style.color=card.gradeColor;
  document.getElementById('gacha-res-name').textContent=card.name;
  const img=document.getElementById('gacha-res-img');
  if(card.img){img.src=card.img;img.style.display='block';}
  else{img.style.display='none';}
  document.getElementById('gacha-overlay').classList.add('show');
}

function meetChar(charId) {
  const ch = CHARS[charId];
  const meet = CHAR_MEET[charId];
  if(!ch || !meet) return;
  const aff = affection[charId] || 0;

  // 요구 호감도 체크
  if(aff < meet.reqAff) {
    showMeetPopup(ch, meet, null, aff);

  const dialog = meet.dialogs.find(d => aff <= d.maxAff) || meet.dialogs[meet.dialogs.length-1];

}

  const ch = CHARS[charId];
  const meet = CHAR_MEET[charId];
  if(!inventory[item] || inventory[item] <= 0) return;

  // 아이템 사용
  inventory[item]--;
  if(inventory[item] === 0) delete inventory[item];

  // 호감도 상승
  if(!affection[charId]) affection[charId] = 0;
  const oldAff = affection[charId];
  affection[charId] = Math.min(5, affection[charId] + 1);
  saveAll();

  // 힌트 체크
  let hintText = '';
  const gotHint = Math.random() < meet.hintChance;
  if(gotHint && meet.hints.length > 0) {
    const hint = meet.hints[Math.floor(Math.random() * meet.hints.length)];
    if(!hints.includes(hint)) {
      hints.push(hint);
      saveAll();
      hintText = `<div style="background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:10px;padding:10px;margin-top:10px;"><div style="font-size:11px;color:#FFD700;font-weight:700;margin-bottom:4px;">💡 단서 획득!</div><div style="font-size:13px;color:#eee;">"${hint}"</div></div>`;
    }
  }

  const newAff = affection[charId];
  const hearts = '❤️'.repeat(newAff) + '🤍'.repeat(5-newAff);
  const affUp = newAff > oldAff;

  const overlay = document.getElementById('meet-overlay');
  overlay.querySelector('div').innerHTML = `
    <div style="text-align:center;padding:8px 0;">
      <div style="font-size:32px;margin-bottom:8px;">${item}</div>
      <div style="font-size:16px;font-weight:900;color:#fff;margin-bottom:6px;">${ch.name}에게 선물했어요!</div>
      <div style="font-size:20px;margin-bottom:6px;">${hearts}</div>
      ${affUp ? '<div style="font-size:13px;color:#FF6B9D;font-weight:700;">💞 호감도 상승!</div>' : '<div style="font-size:12px;color:#888;">이미 최대 호감도예요</div>'}
      ${hintText}
    </div>
    <button onclick="document.getElementById('meet-overlay').remove()" style="width:100%;margin-top:16px;padding:13px;background:linear-gradient(135deg,#FF6B9D,#C084FC);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">확인</button>`;
}

function explorePlace(placeId) {
  const msg = ['탐험 중... 아무것도 발견하지 못했어.', '수상한 흔적이 있어. 더 조사가 필요해.', '뭔가 있는 것 같은데... 연금술 도구가 필요할 것 같아.'];

function openPlace(id) {
  const place = PLACES[id];
  if(!place) return;
  document.getElementById('place-bg-img').src = 'https://raw.githubusercontent.com/chaei7775/Poca-house/main/' + place.img;
  document.getElementById('place-title').textContent = place.title;
  ALL_PLACE_BTNS.forEach(b => { const el=document.getElementById(b); if(el) el.style.display='none'; });
  const btns = PLACE_BUTTONS[id] || [];
  btns.forEach(b => { const el=document.getElementById(b); if(el) el.style.display='block'; });
  document.getElementById('place-overlay').style.display = 'flex';
}

  else if(key==='meet_sion'){ const ch=CHARS['sion'];const meet=CHAR_MEET['sion'];const aff=affection['sion']||0;const dialog=meet.dialogs.find(d=>aff<=d.maxAff)||meet.dialogs[meet.dialogs.length-1];showMeetPopup(ch,meet,aff<meet.reqAff?null:dialog,aff); }
  else if(key==='meet_doyun'){ const ch=CHARS['doyun'];const meet=CHAR_MEET['doyun'];const aff=affection['doyun']||0;const dialog=meet.dialogs.find(d=>aff<=d.maxAff)||meet.dialogs[meet.dialogs.length-1];showMeetPopup(ch,meet,aff<meet.reqAff?null:dialog,aff); }
  else if(key==='meet_harin'){ const ch=CHARS['harin'];const meet=CHAR_MEET['harin'];const aff=affection['harin']||0;const dialog=meet.dialogs.find(d=>aff<=d.maxAff)||meet.dialogs[meet.dialogs.length-1];showMeetPopup(ch,meet,aff<meet.reqAff?null:dialog,aff); }
  else if(key==='meet_yuna'){ const ch=CHARS['yuna'];const meet=CHAR_MEET['yuna'];const aff=affection['yuna']||0;const dialog=meet.dialogs.find(d=>aff<=d.maxAff)||meet.dialogs[meet.dialogs.length-1];showMeetPopup(ch,meet,aff<meet.reqAff?null:dialog,aff); }
  else if(key==='meet_ara'){ const ch=CHARS['ara'];const meet=CHAR_MEET['ara'];const aff=affection['ara']||0;const dialog=meet.dialogs.find(d=>aff<=d.maxAff)||meet.dialogs[meet.dialogs.length-1];showMeetPopup(ch,meet,aff<meet.reqAff?null:dialog,aff); }
  else if(key==='sub_library') openSubPlace('library');
  else if(key==='sub_music') openSubPlace('music');
  else if(key==='sub_council') openSubPlace('council');
  else if(key==='sub_rooftop') openSubPlace('rooftop');
  else if(key==='explore_forest') explorePlace('forest');
  else if(key==='explore_lake') explorePlace('lake');
  else alert('준비 중이에요!');
}
